{% extends 'base.html' %}

{% block content %}
<div class="glass-card animate-fade" style="max-width: 400px; margin: 4rem auto;">
    <h2 style="margin-bottom: 0.5rem; text-align: center;">Welcome Back</h2>
    <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Log in to your social identity</p>
    
    <form method="POST">
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Phone Number</label>
            <input type="text" name="phone" required placeholder="+1234567890" style="width: 100%; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
        </div>
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
            <input type="password" name="password" required placeholder="••••••••" style="width: 100%; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--primary); text-decoration: none;">Sign Up</a>
    </p>
</div>
{% endblock %}
